name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

env:
  COMMANDBOX_VERSION: 6.x
  BOXLANG_VERSION: 1
  TZ: UTC

jobs:

  test:
    name: TestBox specs
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: tesserabx_test
          POSTGRES_USER: tesserabx
          POSTGRES_PASSWORD: tesserabx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tesserabx -d tesserabx_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up CommandBox
        uses: Ortus-Solutions/setup-commandbox@v2.0.1

      - name: Install CommandBox dependencies
        run: box install

      - name: Run database migrations
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: tesserabx_test
          DB_USER: tesserabx
          DB_PASSWORD: tesserabx
          DB_SSL: "false"
          DB_SCHEMA: public
        run: |
          # tasks/Migrate stage copies every add-on migration
          # (sample-addons/<addon>/migrations, modules_app/<addon>/migrations,
          # modules/<TesseraBX-marked>/migrations) into
          # resources/database/migrations/_addon_<slug>_*.cfc so the
          # standard cfmigrations runner picks them up. Staged files
          # are gitignored, so CI MUST stage before migrating or the
          # example-sync add-on's tickets_example_sync table won't
          # exist and Phase13HardeningSpec's cross-org leak probe
          # fails. See commit 7f31678 for the staging design.
          box task run tasks/Migrate stage
          box migrate install
          box migrate up --force

      - name: Start CommandBox server
        env:
          PORT: 8080
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: tesserabx_test
          DB_USER: tesserabx
          DB_PASSWORD: tesserabx
          DB_SSL: "false"
          DB_SCHEMA: public
          ENVIRONMENT: ci
          BOX_SERVER_PROFILE: production
          AI_ENABLED: "false"
          CBFS_DEFAULT_PROVIDER: local
        run: |
          # console=false keeps `box server start` from blocking on CI.
          # First start triggers server.json's onServerInitialInstall,
          # which lays the bx-* server modules into .engine/boxlang/.
          box server start console=false openBrowser=false
          # Wait for /health to come up before running specs.
          # 90 attempts * 2s = up to 3 min. First-run includes a cold
          # Forgebox pull of the bx-* modules; later runs are fast
          # because the runner has the artifact cached.
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:8080/health >/dev/null 2>&1; then
              echo "App is healthy."
              break
            fi
            if [ "$i" = "90" ]; then
              echo "App failed to come up. Dumping server log."
              box server log || true
              exit 1
            fi
            sleep 2
          done

      - name: Run TestBox specs
        # The runner discovers specs from modules_app/<module>/tests/specs
        # AND sample-addons/<addon>/tests/specs, so the Phase 12 example-sync
        # InstallSpec runs automatically as part of every CI run. If the
        # extension contract regresses, the example-sync spec fails the
        # whole pipeline.
        run: box testbox run reporter=text outputFile=tests/results/testbox-report.txt

      - name: Stop CommandBox server
        if: always()
        run: box server stop || true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testbox-report
          path: tests/results/
          if-no-files-found: ignore
